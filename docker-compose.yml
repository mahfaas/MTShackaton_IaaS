services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iaas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iaas_password}
      POSTGRES_DB: ${POSTGRES_DB:-iaas_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iaas_user} -d ${POSTGRES_DB:-iaas_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  control-plane:
    build:
      context: .
      dockerfile: ./control-plane/Dockerfile
    command: >
      bash -c "python -m grpc_tools.protoc -I/proto --python_out=/app --grpc_python_out=/app /proto/cloud.proto &&  uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./control-plane:/app
      - ./proto:/proto
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  compute-node:
    build:
      context: .
      dockerfile: ./compute-node/Dockerfile
    volumes:
      - ./compute-node:/app
      - ./proto:/proto
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "50051:50051"

volumes:
  pgdata:
